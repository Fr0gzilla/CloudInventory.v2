version: "3.8"

services:
  web:
    build: .
    ports:
      - "5050:5050"
    environment:
      - SECRET_KEY=change-me-in-production
      - JWT_SECRET_KEY=change-me-in-production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - DATABASE_URL=sqlite:///cloudinventory.db
      - USE_MOCK_IPAM=true
    volumes:
      - db-data:/app/instance
    restart: unless-stopped

volumes:
  db-data:
