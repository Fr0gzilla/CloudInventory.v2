<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — CloudInventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border: none;
      border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }
    .login-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .login-header p { opacity: 0.8; margin-bottom: 0; font-size: 0.88rem; }
    .login-body { padding: 2rem; border-radius: 0 0 14px 14px; }
    [data-bs-theme="light"] .login-body { background: #fff; }
    [data-bs-theme="dark"] .login-body { background: #1e293b; }
    .form-control { border-radius: 8px; padding: 0.6rem 0.85rem; }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.25); }
    .btn-login {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: none; padding: 0.65rem; font-weight: 600; border-radius: 8px;
    }
    .btn-login:hover { background: linear-gradient(135deg, #1d4ed8, #1e40af); }
    .theme-toggle-login {
      position: fixed; top: 1rem; right: 1rem;
      cursor: pointer; font-size: 1.3rem; color: #fff;
      opacity: 0.6; transition: opacity 0.2s;
    }
    .theme-toggle-login:hover { opacity: 1; }
    .ci-login-icon { font-size: 2rem; }
    @media (max-width: 480px) {
      .login-header { padding: 1.5rem 1.25rem 1.25rem; }
      .login-header h1 { font-size: 1.3rem; }
      .login-body { padding: 1.5rem 1.25rem; }
    }
  </style>
  <script>
    (function() {
      var t = localStorage.getItem('ci-theme') || 'light';
      document.documentElement.setAttribute('data-bs-theme', t);
    })();
  </script>
</head>
<body>
  <span class="theme-toggle-login" id="themeToggle" title="Mode sombre / clair" role="button">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
  </span>

  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-cloud-fill ci-login-icon"></i>
      <h1>CloudInventory</h1>
      <p>Inventaire & supervision de parc virtualise</p>
    </div>
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 mb-3" role="alert">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Utilisateur</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" name="username" placeholder="admin" autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password" placeholder="********" required>
          </div>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Se connecter
        </button>
      </form>
    </div>
  </div>

  <script>
    (function() {
      var html = document.documentElement;
      var icon = document.getElementById('themeIcon');
      function applyTheme(theme) {
        html.setAttribute('data-bs-theme', theme);
        localStorage.setItem('ci-theme', theme);
        if (icon) icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
      }
      applyTheme(localStorage.getItem('ci-theme') || 'light');
      document.getElementById('themeToggle').addEventListener('click', function() {
        applyTheme(html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>
</body>
</html>
